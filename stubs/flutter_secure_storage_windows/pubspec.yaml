name: flutter_secure_storage_windows
description: >-
  Windows stub for flutter_secure_storage — no-op native plugin (Dart FFI handles
  storage). Avoids ATL/MFC build dependency; biometric vault is Android-only.
version: 3.1.2+stub1

environment:
  sdk: '>=2.12.0 <4.0.0'
  flutter: ">=2.0.0"

dependencies:
  ffi: ^2.0.0
  flutter:
    sdk: flutter
  flutter_secure_storage_platform_interface: ^1.1.1
  path: ^1.8.0
  path_provider: ^2.0.0
  win32: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lint: ^2.0.0

flutter:
  plugin:
    implements: flutter_secure_storage
    platforms:
      windows:
        pluginClass: FlutterSecureStorageWindowsPlugin
        dartPluginClass: FlutterSecureStorageWindows