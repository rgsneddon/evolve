# Render Blueprint — Perccent internet rendezvous
# Deploy: https://dashboard.render.com/select-repo?type=blueprint
services:
  - type: web
    name: evolve-perc-rendezvous
    runtime: node
    rootDir: perc_chain
    buildCommand: npm install
    startCommand: npm run start:rendezvous
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
    plan: free