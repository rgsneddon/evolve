# Render Blueprint — Perccent internet node (rendezvous + seed sync)
# Deploy: https://render.com/deploy?repo=https://github.com/rgsneddon/evolve
services:
  - type: web
    name: evolve-perc-internet
    runtime: node
    rootDir: perc_chain
    buildCommand: npm install
    startCommand: npm run start:internet
    healthCheckPath: /health
    autoDeploy: true
    plan: standard
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PERC_SEED_USERNAME
        value: evolve_seed_node
      - key: PERC_DATA_DIR
        value: /var/data
    disk:
      name: perc-seed-data
      mountPath: /var/data
      sizeGB: 1